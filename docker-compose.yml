version: "3.8"

services:
  api-gateway:
    build: ./api-gateway
    command: ["npm", "start"]
    ports:
      - "4000:4000"
    environment:
      - PORT=${API_GATEWAY_PORT}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - TASK_SERVICE_URL=${TASK_SERVICE_URL}
    depends_on:
      - rabbitmq

  auth-service:
    build: ./auth-service
    command: ["npm", "start"]
    ports:
      - "4001:4001"
    environment:
      - PORT=${AUTH_SERVICE_PORT}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - rabbitmq

  task-service:
    build: ./task-service
    command: ["npm", "start"]
    ports:
      - "4002:4002"
    environment:
      - PORT=${TASK_SERVICE_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=${RABBITMQ_URL}
    depends_on:
      - rabbitmq

  notification-service:
    build: ./notification-service
    command: ["npm", "start"]
    ports:
      - "4003:4003"
    environment:
      - PORT=${NOTIFICATION_SERVICE_PORT}
      - RABBITMQ_URL=${RABBITMQ_URL}
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api-gateway
      - auth-service
      - task-service
      - notification-service

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

