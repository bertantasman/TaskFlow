version: "3.8"

services:
  api-gateway:
    build: ./api-gateway
    command: ["npm", "start"]
    ports:
      - "4000:4000"
    environment:
      - PORT=${API_GATEWAY_PORT:-4000}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:4001}
      - TASK_SERVICE_URL=${TASK_SERVICE_URL:-http://task-service:4002}
    depends_on:
      - rabbitmq

  auth-service:
    build: ./auth-service
    command: ["npm", "start"]
    ports:
      - "4001:4001"
    environment:
      - PORT=${AUTH_SERVICE_PORT:-4001}
      - JWT_SECRET=${JWT_SECRET:-supersecret}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672}
    depends_on:
      - rabbitmq

  task-service:
    build: ./task-service
    command: ["npm", "start"]
    ports:
      - "4002:4002"
    environment:
      - PORT=${TASK_SERVICE_PORT:-4002}
      - JWT_SECRET=${JWT_SECRET:-supersecret}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672}
    depends_on:
      - rabbitmq

  notification-service:
    build: ./notification-service
    command: ["npm", "start"]
    ports:
      - "4003:4003"
    environment:
      - PORT=${NOTIFICATION_SERVICE_PORT:-4003}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672}
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

